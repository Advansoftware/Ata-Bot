name: Build & Release

# Gera o app empacotado (PyInstaller) para Windows, macOS e Linux e — quando a
# execução vem de uma tag "v*" — publica uma Release completa (pacotes versionados,
# checksums SHA-256 e notas geradas automaticamente).
#
# Não dá para cross-compilar: cada plataforma builda no seu próprio runner.
#
# Como usar:
#   - Testar o build: aba Actions -> "Build & Release" -> Run workflow.
#   - Lançar uma versão: crie e envie uma tag semver, ex.:
#       git tag -a v1.0.0 -m "v1.0.0" && git push origin v1.0.0
#     Tags com sufixo (v1.0.0-rc1, v1.2.0-beta) viram pré-releases automaticamente.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # o job de release precisa criar/atualizar a Release

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ------------------------------------------------- Versão (fonte da verdade)
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      is_release: ${{ steps.v.outputs.is_release }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            VER="0.0.0-dev+${GITHUB_SHA::7}"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # Pré-release quando a versão tem sufixo (ex.: 1.0.0-rc1).
          if [[ "$VER" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "### Versão: \`$VER\`" >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------- Linux
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      ATABOT_VERSION: ${{ needs.version.outputs.version }}
      ARTIFACT: Ata-Bot-${{ needs.version.outputs.version }}-linux-x86_64
    steps:
      - uses: actions/checkout@v4

      # pywebview no Linux usa PyGObject + WebKitGTK do SISTEMA. O setup-python não
      # enxerga pacotes do apt, então usamos o Python do sistema com um venv
      # "--system-site-packages" para o build ver o gi/WebKit instalados.
      - name: Instalar libs de sistema (WebKitGTK, PortAudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-venv python3-gi python3-gi-cairo \
            gir1.2-webkit2-4.1 libportaudio2

      - name: Criar venv e instalar dependências
        run: |
          python3 -m venv --system-site-packages .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt -r requirements-build.txt

      - name: Empacotar (PyInstaller)
        run: ./.venv/bin/pyinstaller --noconfirm packaging/atabot.spec

      - name: Compactar artefato
        run: |
          cd dist
          tar -czf "../${ARTIFACT}.tar.gz" "Ata Bot"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}.tar.gz
          if-no-files-found: error

  # --------------------------------------------------------------- Windows
  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      ATABOT_VERSION: ${{ needs.version.outputs.version }}
      ARTIFACT: Ata-Bot-${{ needs.version.outputs.version }}-windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Empacotar (PyInstaller)
        run: pyinstaller --noconfirm packaging/atabot.spec

      - name: Compactar artefato
        run: Compress-Archive -Path "dist/Ata Bot" -DestinationPath "${env:ARTIFACT}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}.zip
          if-no-files-found: error

  # ----------------------------------------------------------------- macOS
  build-macos:
    needs: version
    runs-on: macos-latest # Apple Silicon (arm64)
    env:
      ATABOT_VERSION: ${{ needs.version.outputs.version }}
      ARTIFACT: Ata-Bot-${{ needs.version.outputs.version }}-macOS-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Empacotar (PyInstaller)
        run: pyinstaller --noconfirm packaging/atabot.spec

      # ditto preserva a estrutura do .app (symlinks, permissões) melhor que zip.
      - name: Compactar artefato (.app)
        run: ditto -c -k --keepParent "dist/Ata Bot.app" "${ARTIFACT}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}.zip
          if-no-files-found: error

  # --------------------------------------------- Release (só em tags "v*")
  release:
    needs: [version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: needs.version.outputs.is_release == 'true'
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Gerar checksums (SHA-256)
        working-directory: artifacts
        run: |
          sha256sum * > checksums.txt
          echo "### Checksums (SHA-256)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat checksums.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Montar notas da release
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          base="https://github.com/${REPO}/releases/download/${TAG}"
          win="Ata-Bot-${VERSION}-windows-x64.zip"
          mac="Ata-Bot-${VERSION}-macOS-arm64.zip"
          lin="Ata-Bot-${VERSION}-linux-x86_64.tar.gz"
          cat > release_body.md <<EOF
          ## 🎙️ Ata Bot v${VERSION}

          App open source que **grava** reuniões de voz no Discord, **transcreve**
          localmente e **gera a ata** automaticamente.

          ### ⬇️ Downloads

          | Plataforma | Arquivo |
          | --- | --- |
          | 🪟 **Windows** (x64) | [\`${win}\`](${base}/${win}) |
          | 🍎 **macOS** (Apple Silicon) | [\`${mac}\`](${base}/${mac}) |
          | 🐧 **Linux** (x86_64) | [\`${lin}\`](${base}/${lin}) |

          Verifique a integridade dos downloads com o \`checksums.txt\` (SHA-256).

          <details>
          <summary>📦 <b>Como instalar</b></summary>

          **🪟 Windows** — extraia o \`.zip\` e execute **\`Ata Bot.exe\`**. Requer o
          WebView2 Runtime (já vem no Windows 10/11 atualizado).

          **🍎 macOS** — extraia, mova **Ata Bot.app** para *Aplicativos* e, na 1ª vez,
          abra com **clique-direito → Abrir** (o app não é assinado; Gatekeeper).

          **🐧 Linux** — extraia e execute \`./Ata\ Bot/Ata\ Bot\`. Precisa das libs de
          sistema **WebKitGTK** e **PortAudio** (veja o README). Build para x86_64.
          </details>

          > Gravação e transcrição rodam **100% na sua máquina**. Veja o
          > [README](https://github.com/${REPO}#readme) para configurar o bot.
          EOF

      - name: Publicar Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ata Bot v${{ env.VERSION }}
          body_path: release_body.md
          append_body: true # anexa o "What's Changed" gerado automaticamente
          generate_release_notes: true
          prerelease: ${{ needs.version.outputs.prerelease }}
          make_latest: ${{ needs.version.outputs.prerelease == 'false' }}
          files: artifacts/*
          fail_on_unmatched_files: true
